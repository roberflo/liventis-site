<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Liventis FibroScan®</title>
  <script>
    // SPA routing fix for GitHub Pages subdirectory deployment.
    // Encodes the path after the repo-name segment as a query parameter
    // and redirects to index.html, which decodes it back.
    // pathSegmentsToKeep=1 preserves the /liventis/ base path segment.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
